name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/ci.yml"
      - "frontend/**"
      - "backend/**"
      - "contracts/**"
      - "package-lock.json"
      - "frontend/package-lock.json"
      - "backend/package-lock.json"

jobs:
  changes:
    name: Detect Changed Stacks
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - "frontend/**"
            backend:
              - "backend/**"
            contracts:
              - "contracts/**"

  frontend:
    name: Frontend Required Gate
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        if: needs.changes.outputs.frontend == 'true'
        run: npm ci

      - name: Lint
        if: needs.changes.outputs.frontend == 'true'
        run: npm run lint

      - name: Build
        if: needs.changes.outputs.frontend == 'true'
        continue-on-error: true
        run: npm run build

      - name: Skip note (no frontend changes)
        if: needs.changes.outputs.frontend != 'true'
        run: echo "No frontend file changes detected, required gate passed."

  backend:
    name: Backend Required Gate
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        if: needs.changes.outputs.backend == 'true'
        run: npm ci

      - name: Build
        if: needs.changes.outputs.backend == 'true'
        run: npm run build

      - name: Test
        if: needs.changes.outputs.backend == 'true'
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-value-with-minimum-length-32
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          AMANA_ESCROW_CONTRACT_ID: test-escrow-contract
          USDC_CONTRACT_ID: test-usdc-contract
        run: npx jest --config jest.config.ts src/__tests__/stellar.service.test.ts src/__tests__/pathPayment.service.test.ts src/__tests__/wallet.service.test.ts

      - name: Skip note (no backend changes)
        if: needs.changes.outputs.backend != 'true'
        run: echo "No backend file changes detected, required gate passed."

  contracts:
    name: Contracts Required Gate
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: contracts/amana_escrow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        if: needs.changes.outputs.contracts == 'true'
        run: cargo test

      - name: Skip note (no contract changes)
        if: needs.changes.outputs.contracts != 'true'
        run: echo "No contract file changes detected, required gate passed."
