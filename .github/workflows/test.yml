name: CI Test Suite

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend Tests ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (Jest + Coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --coverageReporters=json-summary --coverageReporters=lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          flags: frontend
          directory: frontend/coverage
        continue-on-error: true

  # ── Frontend Visual Tests ───────────────────────────────────────────────────
  frontend-visual:
    name: Frontend Visual Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Setup Node.js
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.changes.outputs.frontend == 'true'
        run: npx playwright install --with-deps

      - name: Run visual tests
        if: steps.changes.outputs.frontend == 'true'
        run: npm run test:visual

      - name: Upload visual test results
        uses: actions/upload-artifact@v4
        if: always() && steps.changes.outputs.frontend == 'true'
        with:
          name: visual-test-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
        continue-on-error: true

  # ── Backend Tests ───────────────────────────────────────────────────────────
  backend:
    name: Backend Tests (Jest + Coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test -- --coverage --ci
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          flags: backend
          directory: backend/coverage
        continue-on-error: true

  # ── Contract CI — fast lane ──────────────────────────────────────────────────
  # Runs unit, integration, fee/evidence, and dispute-flow tests.
  # Skips property suites (quickcheck) to stay within the fast-feedback budget.
  contracts-fast:
    name: Contracts Fast Lane (unit + integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/amana_escrow

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/amana_escrow/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/amana_escrow/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Run fast tests (skip property suites)
        run: cargo test -- --skip property_tests

  # ── Contract CI — full lane ──────────────────────────────────────────────────
  # Runs every test including the quickcheck property suites.
  contracts-full:
    name: Contracts Full Lane (all tests + property suites)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/amana_escrow

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/amana_escrow/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/amana_escrow/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run all tests (including property suites)
        run: cargo test

  # ── Status gate ─────────────────────────────────────────────────────────────
  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [frontend, backend, contracts-fast, contracts-full]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.contracts-fast.result }}" != "success" ] || \
             [ "${{ needs.contracts-full.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All test layers passed"